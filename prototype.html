<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCAP Something Something</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            font-weight: 500;
            overflow-x: hidden;
            background-color: #f8f8f8;
        }

        a {
            text-decoration: none;
            color: #f0f0f0;
            transition: 0.3s;
        }

        .headerlinks:hover {
            transition: 0.3s;
            color: #6abba9;
        }

        #links {
            border: solid 0.5px;
            padding-top: 0.5em;
            padding-bottom: 0.5em;
            border-color: #3d5a80;
            background-color: #3d5a80;
            position: absolute;
            width: 100%;
            top: 0px;
            left: 0px;
        }

        #pageheader {
            transition: 0.3s;
            background-color: #d1d8f7;
            padding: 10em;
        }

        #image_container {
            transform: scale(1);
            transition: 1.5s;
            border: solid 1px;
            border-color: #f0f0f0;
            border-radius: 5px;
            width: 50%;
            height: auto;
        }

        #image_container:hover {
            cursor: crosshair;
            overflow: hidden;
            transition: 0.8s;
            transform: scale(1.7);
        }
    </style>
</head>
<body>
    <div id="links">
        <img src="logo.png" alt="RCAP Product Logo" style="object-fit: cover; padding-left: 1em;" width="70" height="70"><!--300x300 best-->
            <a href="index.html" style="padding-left: 5em;" class="headerlinks">Home</a>
            <a href="ourinfo.html" style="padding-left: 3em;" class="headerlinks">About</a>
            <a href="contact.html" style="padding-left: 3em;" class="headerlinks">Contact Us</a>
    </div>  

    <section id="pageheader">
        <h1 style="text-align: center; font-size: 48px;">Prototype</h1>
        <p style="text-align: center; font-weight: 300;">The planning and development of our prototype.</p>
    </section>

    <div style="text-align: center; padding-top: 5em;">
        <h1>Our prototype in development</h1>
        <h6 style="font-weight: 500;">Hover over image to enlarge.</h6>
        <img src="prototype_blueprint.jpg" alt="" id="image_container">
    </div>

    <div style="text-align: center; padding-top: 5em;">
        <h1>The final product</h1>
        <h6 style="font-weight: 500;">Hover over image to enlarge.</h6>
        <img src="prototype_blueprint.jpg" alt="" id="image_container">
    </div>

</body>
</html>
